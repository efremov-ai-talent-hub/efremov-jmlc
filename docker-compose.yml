x-common-env: &common-env
  TZ: "${TZ:-Europe/Moscow}"

services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      <<: *common-env
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "127.0.0.1:${MINIO_HOST_PORT_API}:9000"
      - "127.0.0.1:${MINIO_HOST_PORT_CONSOLE}:9001"
    volumes:
      - minio-data:/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until /usr/bin/mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo 'Waiting for MinIO...'
          sleep 2
        done
        for b in "$$MINIO_WAREHOUSE_BUCKET" "$$MINIO_RAW_FILES_BUCKET" "$$MINIO_EVAL_DATASETS_BUCKET"; do
          # An unset variable would make this `mc mb local/`, which fails — and
          # without set -e the script would still exit 0 on the trailing echo,
          # reporting a green deploy with a bucket missing.
          [ -n "$$b" ] || { echo "bucket name is empty — check the MINIO_*_BUCKET vars"; exit 1; }
          /usr/bin/mc mb --ignore-existing "local/$$b"
          /usr/bin/mc anonymous set private "local/$$b"
        done
        echo 'MinIO buckets are ready.'
    environment:
      <<: *common-env
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_WAREHOUSE_BUCKET: ${MINIO_WAREHOUSE_BUCKET:-warehouse}
      MINIO_RAW_FILES_BUCKET: ${MINIO_RAW_FILES_BUCKET:-raw-files}
      # Defaulted because ci-deploy.sh keeps an existing .env and never merges new
      # keys into it — a var added here would otherwise interpolate to empty on
      # every host that already has a .env.
      MINIO_EVAL_DATASETS_BUCKET: ${MINIO_EVAL_DATASETS_BUCKET:-eval-datasets}
    networks:
      - lakehouse

  iceberg-postgres:
    image: postgres:15.14-alpine@sha256:64583b3cb4f2010277bdd9749456de78e5c36f8956466ba14b0b96922e510950
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - iceberg-catalog-data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 5

  iceberg-rest:
    # tabulario/iceberg-rest publishes no semver tags — pinned by digest (the
    # :latest that was tested). Unmaintained upstream; revisit apache/iceberg-rest-fixture.
    image: tabulario/iceberg-rest@sha256:3b7d31bdfec626b68e97531c9778a1b9119659e456fe28545a49f6aa6a9ce472
    depends_on:
      minio-init:
        condition: service_completed_successfully
      iceberg-postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      CATALOG_URI: jdbc:postgresql://iceberg-postgres:5432/${POSTGRES_DB}
      CATALOG_JDBC_USER: ${POSTGRES_USER}
      CATALOG_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      CATALOG_WAREHOUSE: s3://${MINIO_WAREHOUSE_BUCKET}/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION}
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx384m"
    ports:
      - "127.0.0.1:${ICEBERG_REST_HOST_PORT}:8181"
    restart: unless-stopped
    networks:
      - lakehouse

  # Applies migrations/*.sql through Trino, in filename order. Replaces the old
  # namespace-creating init step: the schema is now just the first statement of
  # the first migration, so there is no special case for it.
  #
  # Reuses the Trino image because its CLI is already there and the image is
  # already pulled for the server — no extra download on the deploy host.
  #
  # Every statement is idempotent (CREATE ... IF NOT EXISTS), so this re-runs on
  # each deploy. The CLI exits non-zero on the first failing statement, so `set -e`
  # is what catches a broken migration; the DESCRIBE pass afterwards catches the
  # other case — a table dropped or renamed out of band, which no migration would
  # notice.
  iceberg-migrate:
    image: trinodb/trino:444
    platform: linux/amd64
    depends_on:
      trino:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    # Overriding entrypoint does not clear the image's HEALTHCHECK, and that check
    # curls a Trino server this container never starts — it would sit `unhealthy`
    # for its whole life and after exit, for no reason.
    healthcheck:
      disable: true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        [ -e /migrations/001_analysis.sql ] || { echo "no migrations mounted"; exit 1; }
        # Trino reaches the REST catalog lazily, at query time, and iceberg-rest
        # has no healthcheck to depend on — a cold start can put the first
        # CREATE SCHEMA in front of a catalog still coming up. Wait here rather
        # than via `restart:`, which would exit once and let `compose wait` read
        # that first failure as the verdict.
        echo "==> waiting for the iceberg catalog"
        i=0
        until trino --server trino:8080 --user migrate --execute "SHOW SCHEMAS FROM iceberg" > /dev/null 2>&1; do
          i=$$((i + 1))
          [ "$$i" -lt 30 ] || { echo "iceberg catalog unreachable after 30 attempts"; exit 1; }
          sleep 3
        done
        for f in /migrations/*.sql; do
          echo "==> applying $$(basename "$$f")"
          trino --server trino:8080 --user migrate --file "$$f"
        done
        echo "==> verifying"
        for t in calls transcriptions call_reports llm_calls report_inputs; do
          trino --server trino:8080 --user migrate \
            --execute "DESCRIBE iceberg.analysis.$$t" > /dev/null
          echo "    ok: analysis.$$t"
        done
        echo "==> migrations applied"
    networks:
      - lakehouse

  trino:
    image: trinodb/trino:444
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - iceberg-rest
    environment:
      <<: *common-env
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_WAREHOUSE_BUCKET: ${MINIO_WAREHOUSE_BUCKET}
      AWS_REGION: ${AWS_REGION}
    ports:
      - "127.0.0.1:${TRINO_HOST_PORT}:8080"
    volumes:
      - ./infra/trino/etc:/etc/trino
    networks:
      - lakehouse
    # The image ships a healthcheck, but its defaults allow roughly 40s before
    # the container is declared unhealthy. Nothing depended on trino's health
    # until iceberg-migrate did; now that something does, a JVM cold start on a
    # host bringing up a dozen services at once would abort the whole deploy.
    healthcheck:
      test: ["CMD", "/usr/lib/trino/bin/health-check"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  prefect:
    image: prefecthq/prefect:3.7.8-python3.12@sha256:a1a789339d6176bf4ba37e0e7658ad8a4b021e14a63912f00afcd3e8e75d1863
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    depends_on:
      prefect-postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      PREFECT_API_URL: http://prefect:4200/api
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${PREFECT_POSTGRES_USER}:${PREFECT_POSTGRES_PASSWORD}@prefect-postgres:5432/${PREFECT_POSTGRES_DB}
      PREFECT_UI_API_URL: ${PREFECT_UI_API_URL:-/api}
      PREFECT_SERVER_API_AUTH_STRING: ${PREFECT_SERVER_API_AUTH_STRING:-}
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
    ports:
      - "127.0.0.1:${PREFECT_HOST_PORT}:4200"
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  prefect-postgres:
    image: postgres:15.14-alpine@sha256:64583b3cb4f2010277bdd9749456de78e5c36f8956466ba14b0b96922e510950
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_DB: ${PREFECT_POSTGRES_DB}
      POSTGRES_USER: ${PREFECT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PREFECT_POSTGRES_PASSWORD}
    volumes:
      - prefect-postgres-data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 5

  # Executes flow runs. Nothing is deployed yet, so it just polls an empty pool —
  # the stock image is enough. Once flows land it needs their code and deps, and
  # that is the point to give it a build of its own, plus a stop_grace_period so
  # in-flight runs get longer than Docker's default 10s to cancel.
  prefect-worker:
    # Carries the flow code and its dependencies, so it needs a build of its own
    # rather than the stock image the empty pool was fine with.
    build:
      context: .
      dockerfile: infra/images/Dockerfile.prefect-worker
      # Same reason as gigaam: bulk transfers stall from a container on the
      # default bridge on the deploy host.
      network: host
    image: efremov-jmlc/prefect-worker:latest
    restart: unless-stopped
    depends_on:
      prefect:
        condition: service_healthy
    # The pool is created on first start either way; --type only makes the type
    # it is created as explicit rather than implicit. --name keeps a single
    # worker record across restarts instead of registering a fresh offline one
    # every time. List form so a pool name is never word-split.
    command:
      - prefect
      - worker
      - start
      - --pool
      - ${PREFECT_WORK_POOL:-default-pool}
      - --type
      - process
      - --name
      - prefect-worker
      - --with-healthcheck
    environment:
      <<: *common-env
      PREFECT_API_URL: http://prefect:4200/api
      # Client-side counterpart of the server's PREFECT_SERVER_API_AUTH_STRING.
      PREFECT_API_AUTH_STRING: ${PREFECT_SERVER_API_AUTH_STRING:-}
      PREFECT_LOGGING_EXTRA_LOGGERS: pipelines,ai
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_USER: ${TRINO_USER:-pipelines}
      TRINO_CATALOG: iceberg
      ANALYSIS_SCHEMA: analysis
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_RAW_FILES_BUCKET: ${MINIO_RAW_FILES_BUCKET}
      MINIO_EVAL_DATASETS_BUCKET: ${MINIO_EVAL_DATASETS_BUCKET}
      # The domain layer reaches models through the proxy, never a provider directly.
      OPENAI_API_BASE_URL: http://litellm:4000
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      SELLER_BRAND: ${SELLER_BRAND:-Девелопер}
      SELLER_PROJECTS: ${SELLER_PROJECTS:-}
    networks:
      - lakehouse
    # The worker exits on an unreachable API instead of retrying, and depends_on
    # only gates the first start — so a later server restart leaves it flapping
    # under restart: unless-stopped. This makes that visible in `ps` rather than
    # letting the worker go silently missing.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  litellm-db:
    image: postgres:15.14-alpine@sha256:64583b3cb4f2010277bdd9749456de78e5c36f8956466ba14b0b96922e510950
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_DB: ${LITELLM_DB_NAME}
      POSTGRES_USER: ${LITELLM_DB_USER}
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LITELLM_DB_USER} -d ${LITELLM_DB_NAME}"]
      interval: 3s
      timeout: 3s
      retries: 5

  litellm:
    build:
      context: ./infra/litellm
      dockerfile: Dockerfile
    image: efremov-jmlc/litellm:latest
    restart: unless-stopped
    depends_on:
      litellm-db:
        condition: service_healthy
      mcp-grafana:
        condition: service_started
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      <<: *common-env
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: ${LITELLM_DATABASE_URL}
      GIGACHAT_CREDENTIALS: ${LITELLM_GIGACHAT_CREDENTIALS:-}
      GIGACHAT_SCOPE: ${LITELLM_GIGACHAT_SCOPE:-GIGACHAT_API_B2B}
      # Self-hosted GigaAM wrapper (OpenAI-compatible). The wrapper ignores the
      # api_key; the var exists so config.yaml can resolve os.environ/GIGAAM_MASTER_KEY.
      GIGAAM_API_BASE_URL: ${LITELLM_GIGAAM_BASE_URL:-http://gigaam:8000/v1}
      # Must stay non-empty: LiteLLM treats a falsy api_key as "unset" and falls
      # back to OPENAI_API_KEY, which does not exist here, so the OpenAI client
      # raises before the request ever reaches the wrapper. The wrapper itself
      # ignores the value.
      GIGAAM_MASTER_KEY: ${LITELLM_GIGAAM_MASTER_KEY:-sk-gigaam-noauth}
      GIGACHAT_VERIFY_SSL_CERTS: ${LITELLM_GIGACHAT_VERIFY_SSL_CERTS:-false}
      # Disables outbound TLS verification proxy-wide. Needed because GigaChat —
      # the only upstream provider here — serves a Russian Trusted CA chain absent
      # from the default bundle; this is its documented integration path. Blast
      # radius is limited to GigaChat since no other provider is configured. To
      # verify certs instead, mount that CA and drop these two vars.
      REQUESTS_CA_BUNDLE: ""
      CURL_CA_BUNDLE: ""
      MAX_STRING_LENGTH_PROMPT_IN_DB: ${LITELLM_MAX_STRING_LENGTH_PROMPT_IN_DB:-50000}
      DISABLE_SCHEMA_UPDATE: ${LITELLM_DISABLE_SCHEMA_UPDATE:-False}
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:${LITELLM_HOST_PORT:-34000}:4000"
    networks:
      - lakehouse

  gigaam:
    build:
      context: ./ai/infra/gigaam
      dockerfile: Dockerfile
      # Build on the host network. On the deploy host, bulk transfers to
      # download.pytorch.org stall from a container on the default 1500-MTU
      # bridge: response headers arrive, the body times out, and pip ends up
      # parsing an empty index ("from versions: none"). Observed, without a
      # confirmed mechanism: the same fetch succeeds from the host and from a
      # container on a 1400-MTU network; apt-get in this same build is fine.
      # BuildKit accepts only `host` or `none` here — pointing this at a
      # compose-defined lower-MTU network is rejected outright.
      # Trade-off: build steps share the host network namespace and can reach
      # loopback-bound services. Bounded by every dependency being version- or
      # sha-pinned, so no unreviewed third-party code runs here.
      network: host
    image: efremov-jmlc/gigaam:latest
    # amd64-only in practice: torchcodec (required by gigaam[longform]) ships no
    # linux-aarch64 wheel, so a native arm64 build fails at that layer. Stating it
    # here makes an arm64 dev machine build under emulation instead.
    platform: linux/amd64
    restart: unless-stopped
    environment:
      <<: *common-env
      # pyannote VAD weights are gated on HuggingFace — longform transcription
      # fails without a token that has accepted the model terms.
      HF_TOKEN: ${GIGAAM_HF_TOKEN:-}
      GIGAAM_MODEL: ${GIGAAM_MODEL:-v3_e2e_rnnt}
      GIGAAM_THREADS: ${GIGAAM_THREADS:-3}
      GIGAAM_DOWNLOAD_ROOT: /cache/gigaam
      HF_HOME: /cache/hf
      PYANNOTE_CACHE: /cache/pyannote
    ports:
      - "127.0.0.1:${GIGAAM_HOST_PORT:-38103}:8000"
    volumes:
      - gigaam-cache:/cache
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      # Model weights download on first boot and load into RAM — slow start.
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana-oss:13.0.2@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    restart: unless-stopped
    environment:
      <<: *common-env
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-33000}:3000"
    networks:
      - lakehouse

  mcp-grafana:
    # mcp/grafana reports version "(devel)" and publishes no semver tag — pinned by digest.
    image: mcp/grafana@sha256:9362bcf6aa0e44e61f645b905cec03fb346a946a34a4dafecd7f3e28d3724014
    depends_on:
      - grafana
    command:
      - "-t"
      - "streamable-http"
      - "--disable-write"
      - "--disable-alerting"
      - "-allowed-hosts"
      - "mcp-grafana:8000,localhost:8000,127.0.0.1:8000"
    environment:
      <<: *common-env
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USERNAME: ${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    networks:
      - lakehouse
    restart: unless-stopped

networks:
  lakehouse:
    driver: bridge

volumes:
  minio-data:
  iceberg-catalog-data:
  prefect-postgres-data:
  litellm-db-data:
  grafana-data:
  gigaam-cache:

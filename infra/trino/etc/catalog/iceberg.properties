# The only catalog: Trino -> Iceberg REST -> MinIO (S3).
# Secrets come from the environment (${ENV:VAR}), passed into the container from
# .env via the trino service in docker-compose.yml — so a changed MinIO password
# never silently skews from what Trino uses.
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.rest-catalog.warehouse=s3://${ENV:MINIO_WAREHOUSE_BUCKET}

fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
s3.region=${ENV:AWS_REGION}
